<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enigma - Admin Dashboard</title>
    
    <script>
        if (!localStorage.getItem('enigma_admin')) window.location.replace('/admin-login.html');
        function adminLogout() { localStorage.removeItem('enigma_admin'); window.location.replace('/admin-login.html'); }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #0f172a; color: white; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        .sidebar-closed { transform: translateX(-100%); }
        @media (min-width: 768px) { .sidebar-closed { transform: translateX(0); } }
    </style>
</head>
<body class="h-screen flex relative">
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

    <div id="sidebar-placeholder"></div>

    <div class="flex-1 flex flex-col h-full overflow-hidden">
        <div id="admin-header-placeholder"></div>

        <main class="flex-1 overflow-y-auto p-4 sm:p-8 flex flex-col">
            <div class="w-full max-w-6xl mx-auto flex-1">
                <h1 class="text-3xl font-black mb-8 uppercase tracking-tighter italic">System Overview</h1>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="glass-card rounded-xl p-6 border-blue-500/30 border-l-4 border-l-blue-500">
                        <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-2">Total Operatives</p>
                        <p id="stat-users" class="text-4xl font-black">0</p>
                    </div>
                    <div class="glass-card rounded-xl p-6 border-emerald-500/30 border-l-4 border-l-emerald-500">
                        <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-2">Global Missions</p>
                        <p id="stat-puzzles" class="text-4xl font-black">0</p>
                    </div>
                    <div class="glass-card rounded-xl p-6 border-purple-500/30 border-l-4 border-l-purple-500">
                        <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-2">Breaches Attempted</p>
                        <p id="stat-plays" class="text-4xl font-black">0</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            await loadComponent('sidebar-placeholder', '/components/admin-sidebar.html');
            await loadComponent('admin-header-placeholder', '/components/admin-header.html');
            lucide.createIcons();
            
            // Setup User UI
            const admin = JSON.parse(localStorage.getItem('enigma_admin'));
            document.getElementById('admin-header-name').textContent = admin.name;
            document.getElementById('admin-dd-name').textContent = admin.name;
            document.getElementById('admin-dd-email').textContent = admin.email;
            document.getElementById('admin-page-title').innerText = "Master Control";
            const nav = document.getElementById('nav-admin-dash');
            if(nav) nav.className = "w-full flex items-center px-4 py-3 rounded-lg bg-red-600/10 text-red-400 border border-red-500/30 transition-all";
            
            fetch('/api/admin/stats').then(r=>r.json()).then(d => {
                document.getElementById('stat-users').innerText = d.users;
                document.getElementById('stat-puzzles').innerText = d.puzzles;
                document.getElementById('stat-plays').innerText = d.plays;
            });
        });
        async function loadComponent(id, path) { try { const res = await fetch(path); if(res.ok) document.getElementById(id).outerHTML = await res.text(); } catch(e){} }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-closed'); document.getElementById('sidebar').classList.toggle('sidebar-open'); document.getElementById('sidebar-backdrop').classList.toggle('hidden'); }
        function toggleAdminProfileDropdown() { const dd = document.getElementById('admin-profile-dropdown'); dd.classList.toggle('hidden'); setTimeout(() => { dd.classList.toggle('opacity-0'); dd.classList.toggle('scale-95'); }, 10); }
    </script>
</body>
</html>
