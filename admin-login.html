<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enigma - Admin Login</title>
    
    <script>
        if (localStorage.getItem('enigma_admin')) {
            window.location.replace('/admin-dashboard.html');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(239, 68, 68, 0.2); backdrop-filter: blur(16px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <div class="absolute inset-0 bg-[url('image.jpg')] bg-cover bg-center opacity-20 grayscale"></div>
    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl z-[300] hidden transition-opacity duration-300 font-black text-[10px] uppercase tracking-widest backdrop-blur-md border border-red-500/30 bg-red-500/20 text-red-400"></div>

    <div class="glass p-10 rounded-2xl w-full max-w-md z-10 relative shadow-2xl shadow-red-900/20">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-red-600 to-orange-600"></div>
        <div class="flex justify-center mb-6"><i data-lucide="shield-alert" class="w-12 h-12 text-red-500"></i></div>
        <h2 class="text-3xl font-black text-center mb-8 tracking-widest uppercase">System Override</h2>
        
        <form id="admin-login-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-red-400/80 uppercase mb-2">Admin Credentials</label>
                <input type="email" id="email" required class="w-full bg-black/50 border border-slate-800 rounded-lg p-4 text-white outline-none focus:border-red-500 transition" placeholder="Root Email">
            </div>
            <div>
                <input type="password" id="password" required class="w-full bg-black/50 border border-slate-800 rounded-lg p-4 text-white outline-none focus:border-red-500 transition" placeholder="Passkey">
            </div>
            <button type="submit" id="btn-login" class="w-full bg-red-600 hover:bg-red-500 py-4 rounded-lg font-black uppercase tracking-widest transition shadow-lg shadow-red-600/20 mt-4">Initiate Override</button>
        </form>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login'); btn.innerText = "Authenticating..."; btn.disabled = true;
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('enigma_admin', JSON.stringify(data.user));
                    window.location.replace('/admin-dashboard.html');
                } else {
                    const toast = document.getElementById('toast'); toast.innerText = data.error; toast.classList.remove('hidden', 'opacity-0');
                    setTimeout(() => toast.classList.add('opacity-0', 'hidden'), 3000);
                }
            } catch(e) { alert("Server Offline."); } finally { btn.innerText = "Initiate Override"; btn.disabled = false; }
        });
    </script>
</body>
</html>
