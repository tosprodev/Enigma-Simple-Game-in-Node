<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enigma - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-image: url('image.jpg'); background-size: cover; background-position: center; background-attachment: fixed; overflow: hidden; }
        .overlay { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); position: absolute; inset: 0; z-index: -1; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border-right: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        .sidebar-closed { transform: translateX(-100%); }
        @media (min-width: 768px) { .sidebar-closed { transform: translateX(0); } }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); } ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 h-screen flex relative">
    <div class="overlay"></div>
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>
    <div id="sidebar-placeholder"></div>
    <div class="flex-1 flex flex-col h-full overflow-hidden relative z-10">
        <div id="header-placeholder" class="shrink-0"></div>
        <div class="flex-1 overflow-y-auto">
            <main class="min-h-full flex flex-col">
                <div class="p-4 sm:p-8 w-full max-w-6xl mx-auto flex-1 flex flex-col">
                    <h1 class="text-3xl font-bold mb-2 uppercase tracking-tighter italic">Command Center</h1>
                    <p class="text-slate-400 mb-8">Overall metrics for your tactical ecosystem.</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10 shrink-0">
                        <div class="glass-card rounded-xl p-6 border-blue-500/20 backdrop-blur-md">
                            <div class="flex justify-between mb-2"><p class="text-xs text-blue-400 uppercase font-black tracking-widest">Total Puzzles</p><i data-lucide="grid" class="w-5 h-5 text-blue-400"></i></div>
                            <p id="stat-total-puzzles" class="text-3xl font-black text-white">...</p>
                        </div>
                        <div class="glass-card rounded-xl p-6 border-emerald-500/20 backdrop-blur-md">
                            <div class="flex justify-between mb-2"><p class="text-xs text-emerald-400 uppercase font-black tracking-widest">Total Solves</p><i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i></div>
                            <p id="stat-total-solves" class="text-3xl font-black text-white">...</p>
                        </div>
                        <div class="glass-card rounded-xl p-6 border-purple-500/20 backdrop-blur-md">
                            <div class="flex justify-between mb-2"><p class="text-xs text-purple-400 uppercase font-black tracking-widest">Best Time</p><i data-lucide="zap" class="w-5 h-5 text-purple-400"></i></div>
                            <p id="stat-best-time" class="text-3xl font-black text-white">...</p>
                        </div>
                        <div class="glass-card rounded-xl p-6 border-orange-500/20 backdrop-blur-md">
                            <div class="flex justify-between mb-2"><p class="text-xs text-orange-400 uppercase font-black tracking-widest">Total Moves</p><i data-lucide="mouse-pointer-click" class="w-5 h-5 text-orange-400"></i></div>
                            <p id="stat-total-moves" class="text-3xl font-black text-white">...</p>
                        </div>
                    </div>
                    <div class="mt-4 flex-1">
                        <h2 class="text-xl font-black mb-6 uppercase tracking-widest text-white/80 border-b border-white/10 pb-3">Latest Deployments</h2>
                        <div id="recent-puzzles-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 content-start">
                            </div>
                    </div>
                </div>
                <div id="footer-placeholder" class="mt-auto shrink-0 w-full"></div>
            </main>
        </div>
    </div>

    <script>
        const userStr = localStorage.getItem('cinematic_user');
        document.addEventListener("DOMContentLoaded", async () => {
            if (!userStr) return window.location.href = '/index.html';
            await loadComponent('sidebar-placeholder', '/components/sidebar.html');
            await loadComponent('header-placeholder', '/components/header.html');
            await loadComponent('footer-placeholder', '/components/footer.html');
            lucide.createIcons();
            const nav = document.getElementById('nav-dashboard');
            if(nav) nav.className = "w-full flex items-center px-4 py-3 rounded-lg bg-blue-600/20 text-blue-400 border border-blue-500/30 transition-all";
            const user = JSON.parse(userStr);
            document.getElementById('header-name').textContent = user.name || user.email.split('@')[0];
            document.getElementById('dd-name').textContent = user.name || user.email.split('@')[0];
            document.getElementById('dd-email').textContent = user.email;
            loadMetrics(user.email);
        });
        async function loadComponent(id, path) {
            try { const res = await fetch(path); if(res.ok) document.getElementById(id).outerHTML = await res.text(); } catch(e){}
        }
        async function loadMetrics(email) {
            try {
                const res = await fetch(`/api/dashboard/${email}`);
                const data = await res.json();
                let ts = 0, tm = 0, bt = Infinity;
                data.puzzles.forEach(p => {
                    ts += p.plays.length;
                    p.plays.forEach(pl => { tm += pl.moves; if(pl.time_seconds < bt) bt = pl.time_seconds; });
                });
                document.getElementById('stat-total-puzzles').innerText = data.puzzles.length;
                document.getElementById('stat-total-solves').innerText = ts;
                document.getElementById('stat-total-moves').innerText = tm;
                document.getElementById('stat-best-time').innerText = bt === Infinity ? "0s" : bt + "s";
                const container = document.getElementById('recent-puzzles-container');
                container.innerHTML = '';
                const recent = data.puzzles.slice(0, 4);
                if(recent.length === 0) {
                    container.innerHTML = `<div class="col-span-full py-8 flex flex-col items-center justify-center text-slate-500"><i data-lucide="activity" class="w-8 h-8 mb-3 opacity-50"></i><p class="font-bold italic uppercase tracking-widest text-[10px]">No active deployments found.</p></div>`;
                } else {
                    recent.forEach(p => {
                        let st = p.plays.slice(0, 3).map(pl => `<div class="flex justify-between text-[10px] py-1 border-b border-white/5 last:border-0"><span class="font-bold text-white uppercase truncate pr-2">${pl.player_name}</span><span class="shrink-0 text-emerald-400 font-bold">${pl.moves}mv</span></div>`).join('') || '<p class="text-[9px] text-slate-600 py-3 text-center font-bold uppercase tracking-widest">Awaiting Logs</p>';
                        const plLink = `${window.location.origin}/play.html?id=${p.id}`;
                        const thumb = p.type === 'image' ? p.image_url : 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=400';
                        
                        container.innerHTML += `
                        <div class="glass-card rounded-xl overflow-hidden flex flex-col border border-white/10 hover:border-blue-500/50 transition duration-300">
                            <div class="h-32 bg-cover bg-center relative group shrink-0" style="background-image: url('${thumb}')">
                                <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center z-10 backdrop-blur-sm"><a href="${plLink}" target="_blank" class="bg-blue-600 text-white text-[9px] font-black px-4 py-2 rounded uppercase tracking-widest">Launch</a></div>
                                <span class="absolute top-2 left-2 bg-black/80 text-white text-[8px] font-black px-2 py-0.5 rounded uppercase z-10 border border-white/10 italic">${p.type === 'image' ? p.grid_size + 'x' + p.grid_size : 'CIPHER'}</span>
                            </div>
                            <div class="p-4 flex-1 flex flex-col bg-slate-900/40">
                                <h3 class="font-black text-xs text-white uppercase truncate mb-3 italic tracking-tight">${p.title}</h3>
                                <div class="flex-1 bg-black/30 border border-white/5 rounded-lg px-3">${st}</div>
                            </div>
                        </div>`;
                    });
                }
                lucide.createIcons();
            } catch(e) { console.error(e); }
        }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-closed'); document.getElementById('sidebar').classList.toggle('sidebar-open'); document.getElementById('sidebar-backdrop').classList.toggle('hidden'); }
        function toggleProfileDropdown() { 
            const dd = document.getElementById('profile-dropdown'); 
            if (!dd) return;
            if (dd.classList.contains('hidden')) {
                dd.classList.remove('hidden'); 
                setTimeout(() => { dd.classList.remove('opacity-0', 'scale-95'); }, 10); 
            } else {
                dd.classList.add('opacity-0', 'scale-95'); 
                setTimeout(() => { dd.classList.add('hidden'); }, 300); 
            }
        }
        function logout() { localStorage.removeItem('cinematic_user'); window.location.href = '/index.html'; }
    </script>
</body>
</html>
