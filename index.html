<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Cinematic Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-image: url('image.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0a0b10;
        }
        
        .overlay {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            outline: none;
        }
        
        .fade-enter-active { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="absolute inset-0 overlay z-0"></div>

    <div class="glass-card w-full max-w-md rounded-2xl p-8 z-10 relative overflow-hidden">
        
        <div id="message-box" class="hidden text-center p-3 mb-4 rounded-lg text-sm font-semibold transition-all"></div>

        <div id="auth-view" class="transition-all duration-500">
            <h2 class="text-3xl font-bold text-white mb-2 text-center tracking-wide uppercase">Enter The Grid</h2>
            <p class="text-gray-400 text-sm text-center mb-8">We will send a secure code to your email.</p>

            <form id="auth-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Full Name</label>
                    <input type="text" id="user-name" required class="input-field w-full rounded-lg px-4 py-3 text-sm placeholder-gray-500" placeholder="John Doe">
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Email Address</label>
                    <input type="email" id="user-email" required class="input-field w-full rounded-lg px-4 py-3 text-sm placeholder-gray-500" placeholder="hello@example.com">
                </div>
                
                <button type="submit" id="btn-request" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                    <i data-lucide="send" class="w-4 h-4"></i>
                    Send Access Code
                </button>
            </form>
        </div>

        <div id="otp-view" class="hidden transition-all duration-500">
            <h2 class="text-3xl font-bold text-white mb-2 text-center tracking-wide uppercase">Verify Identity</h2>
            <p class="text-gray-400 text-sm text-center mb-8">Enter the 6-digit code sent to <span id="display-email" class="text-blue-400 font-semibold"></span></p>

            <form id="otp-form" class="space-y-5">
                <div>
                    <input type="number" id="user-otp" required class="input-field w-full rounded-lg px-4 py-4 text-center text-2xl tracking-[0.5em] placeholder-gray-600 font-mono" placeholder="------" oninput="if(this.value.length > 6) this.value = this.value.slice(0,6);">
                </div>
                
                <button type="submit" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                    <i data-lucide="shield-check" class="w-4 h-4"></i>
                    Authenticate
                </button>
                
                <button type="button" onclick="goBack()" class="w-full text-gray-400 text-sm hover:text-white transition-colors mt-2 flex justify-center items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Back to Email
                </button>
            </form>
        </div>
    </div>

    <script>
        // 1. SESSION GATEKEEPER
        (function() {
            const userSession = localStorage.getItem('cinematic_user');
            if (userSession) {
                window.location.href = '/dashboard.html';
            }
        })();

        // Initialize Icons
        lucide.createIcons();

        const API_URL = '/api';
        let currentEmail = '';

        function showMessage(msg, isError = false) {
            const box = document.getElementById('message-box');
            box.textContent = msg;
            box.className = `p-3 mb-4 rounded-lg text-sm font-semibold transition-all ${isError ? 'bg-red-500/20 text-red-300 border border-red-500/50' : 'bg-green-500/20 text-green-300 border border-green-500/50'}`;
            box.classList.remove('hidden');
        }

        function goBack() {
            document.getElementById('otp-view').classList.add('hidden');
            document.getElementById('auth-view').classList.remove('hidden');
            document.getElementById('auth-view').classList.add('fade-enter-active');
            document.getElementById('message-box').classList.add('hidden');
        }

        // Handle Request OTP
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            const btn = document.getElementById('btn-request');

            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Sending...';
            lucide.createIcons();
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/request-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email })
                });
                const data = await res.json();
                
                if (res.ok) {
                    currentEmail = email;
                    document.getElementById('display-email').textContent = email;
                    showMessage(data.message);
                    
                    document.getElementById('auth-view').classList.add('hidden');
                    document.getElementById('otp-view').classList.remove('hidden');
                    document.getElementById('otp-view').classList.add('fade-enter-active');
                } else {
                    showMessage(data.error, true);
                }
            } catch (err) {
                showMessage('Server connection failed.', true);
            } finally {
                btn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> Send Access Code';
                lucide.createIcons();
                btn.disabled = false;
            }
        });

        // Handle OTP Verification
        document.getElementById('otp-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('user-otp').value;

            try {
                const res = await fetch(`${API_URL}/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, otp })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showMessage(data.message);
                    const card = document.querySelector('.glass-card');
                    card.style.borderColor = '#10b981';
                    card.style.boxShadow = '0 0 30px rgba(16, 185, 129, 0.4)';
                    
                    // Store session (ensure data.name exists from server)
                    localStorage.setItem('cinematic_user', JSON.stringify({ name: data.name, email: currentEmail }));
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1000);
                } else {
                    showMessage(data.error, true);
                }
            } catch (err) {
                showMessage('Server connection failed.', true);
            }
        });
    </script>
</body>
</html>
