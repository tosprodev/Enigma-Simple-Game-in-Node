<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enigma - Admin Profile</title>
    
    <script>
        if (!localStorage.getItem('enigma_admin')) {
            window.location.replace('/admin-login.html');
        }
        function adminLogout() {
            localStorage.removeItem('enigma_admin');
            window.location.replace('/admin-login.html');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Montserrat', sans-serif; background-color: #0f172a; color: white; } 
        .glass-panel { background: rgba(15, 23, 42, 0.9); border-right: 1px solid rgba(255, 255, 255, 0.05); } 
        .glass-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        .sidebar-closed { transform: translateX(-100%); }
        @media (min-width: 768px) { .sidebar-closed { transform: translateX(0); } }
    </style>
</head>
<body class="h-screen flex relative">
    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl z-[300] hidden transition-opacity duration-300 font-black text-[10px] uppercase tracking-widest backdrop-blur-md border shadow-2xl"></div>
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>
    <div id="sidebar-placeholder"></div>
    <div class="flex-1 flex flex-col h-full overflow-hidden">
        <div id="admin-header-placeholder"></div>
        <main class="flex-1 overflow-y-auto p-4 sm:p-8">
            <div class="w-full max-w-3xl mx-auto">
                <h1 class="text-3xl font-black mb-8 uppercase tracking-tighter italic">System Administrator Identity</h1>
                <div class="glass-card rounded-2xl p-6 sm:p-10 border-t-4 border-t-red-600 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="fingerprint" class="w-32 h-32 text-red-500"></i></div>
                    <form id="profile-form" class="space-y-8 relative z-10">
                        <div>
                            <h3 class="text-lg font-bold text-white mb-4 border-b border-white/10 pb-2 uppercase tracking-widest text-red-400">Profile Configuration</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Display Name</label>
                                    <input type="text" id="a-name" required class="w-full bg-slate-900/60 border border-slate-700 rounded-lg p-3 text-white focus:border-red-500 outline-none transition font-bold">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Root Email Address</label>
                                    <input type="email" id="a-email" required class="w-full bg-slate-900/60 border border-slate-700 rounded-lg p-3 text-white focus:border-red-500 outline-none transition font-bold">
                                </div>
                            </div>
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-white mb-4 border-b border-white/10 pb-2 uppercase tracking-widest text-red-400">Security Override</h3>
                            <p class="text-xs text-slate-500 mb-4 font-bold">Leave these blank if you do not wish to change your password.</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">New Passkey</label>
                                    <input type="password" id="a-new-pass" class="w-full bg-slate-900/60 border border-slate-700 rounded-lg p-3 text-white focus:border-red-500 outline-none transition">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Confirm New Passkey</label>
                                    <input type="password" id="a-confirm-pass" class="w-full bg-slate-900/60 border border-slate-700 rounded-lg p-3 text-white focus:border-red-500 outline-none transition">
                                </div>
                            </div>
                        </div>
                        <div class="bg-red-500/5 border border-red-500/20 p-6 rounded-xl">
                            <h3 class="text-sm font-bold text-red-400 mb-4 uppercase tracking-widest flex items-center gap-2">
                                <i data-lucide="shield-alert" class="w-4 h-4"></i> Authorization Required
                            </h3>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Current Passkey <span class="text-red-500">*</span></label>
                                <input type="password" id="a-current-pass" required placeholder="Verify identity to apply changes" class="w-full bg-black border border-slate-700 rounded-lg p-4 text-white focus:border-red-500 outline-none transition shadow-inner font-mono">
                            </div>
                        </div>
                        <div class="flex justify-end pt-4">
                            <button type="submit" id="btn-save" class="bg-red-600 hover:bg-red-500 text-white px-8 py-3 rounded-lg font-black uppercase tracking-widest transition shadow-lg shadow-red-600/20 flex items-center gap-2">
                                <i data-lucide="save" class="w-4 h-4"></i> Apply Configuration
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentUser;
        document.addEventListener("DOMContentLoaded", async () => {
            await loadComponent('sidebar-placeholder', '/components/admin-sidebar.html');
            await loadComponent('admin-header-placeholder', '/components/admin-header.html');
            lucide.createIcons();
            const nav = document.getElementById('nav-admin-profile');
            if(nav) nav.className = "w-full flex items-center px-4 py-3 rounded-lg bg-red-600/10 text-red-400 border border-red-500/30 transition-all";
            currentUser = JSON.parse(localStorage.getItem('enigma_admin'));
            document.getElementById('admin-header-name').textContent = currentUser.name;
            document.getElementById('admin-dd-name').textContent = currentUser.name;
            document.getElementById('admin-dd-email').textContent = currentUser.email;
            document.getElementById('admin-page-title').innerText = "Administrator Identity";
            document.getElementById('a-name').value = currentUser.name;
            document.getElementById('a-email').value = currentUser.email;
            document.getElementById('profile-form').addEventListener('submit', handleProfileUpdate);
        });
        async function handleProfileUpdate(e) {
            e.preventDefault();
            const newName = document.getElementById('a-name').value.trim();
            const newEmail = document.getElementById('a-email').value.trim();
            const currentPassword = document.getElementById('a-current-pass').value;
            const newPassword = document.getElementById('a-new-pass').value;
            const confirmPassword = document.getElementById('a-confirm-pass').value;
            if (newPassword && newPassword !== confirmPassword) {
                return showToast("Error: New passkeys do not match.");
            }
            const btn = document.getElementById('btn-save');
            btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Processing...'; 
            btn.disabled = true; lucide.createIcons();
            try {
                const res = await fetch('/api/admin/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        currentEmail: currentUser.email,
                        currentPassword: currentPassword,
                        newName: newName,
                        newEmail: newEmail,
                        newPassword: newPassword || null
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showToast("Configuration Applied Successfully!", true);
                    localStorage.setItem('enigma_admin', JSON.stringify(data.user));
                    currentUser = data.user;
                    document.getElementById('admin-header-name').textContent = currentUser.name;
                    document.getElementById('admin-dd-name').textContent = currentUser.name;
                    document.getElementById('admin-dd-email').textContent = currentUser.email;
                    document.getElementById('a-current-pass').value = '';
                    document.getElementById('a-new-pass').value = '';
                    document.getElementById('a-confirm-pass').value = '';

                } else {
                    showToast(data.error);
                }
            } catch (err) {
                showToast("System Communication Error.");
            } finally {
                btn.innerHTML = '<i data-lucide="save" class="w-4 h-4"></i> Apply Configuration'; 
                btn.disabled = false; 
                lucide.createIcons();
            }
        }
        function showToast(msg, isSuccess = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `fixed top-6 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl z-[300] transition-opacity duration-300 font-black text-[10px] uppercase tracking-widest backdrop-blur-md border ${isSuccess ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30' : 'bg-red-500/20 text-red-400 border-red-500/30'} shadow-2xl`;
            toast.classList.remove('hidden', 'opacity-0');
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.classList.add('hidden'), 300); }, 3000);
        }
        async function loadComponent(id, path) { try { const res = await fetch(path); if(res.ok) document.getElementById(id).outerHTML = await res.text(); } catch(e){} }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-closed'); document.getElementById('sidebar').classList.toggle('sidebar-open'); document.getElementById('sidebar-backdrop').classList.toggle('hidden'); }
        function toggleAdminProfileDropdown() { const dd = document.getElementById('admin-profile-dropdown'); dd.classList.toggle('hidden'); setTimeout(() => { dd.classList.toggle('opacity-0'); dd.classList.toggle('scale-95'); }, 10); }
    </script>
</body>
</html>
